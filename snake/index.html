<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #33ff33;
    font-family: 'Courier New', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    user-select: none;
  }
  h1 {
    font-size: 2rem;
    letter-spacing: 0.3em;
    margin-bottom: 0.5rem;
    text-shadow: 0 0 10px #33ff33;
  }
  #hud {
    display: flex;
    gap: 2rem;
    font-size: 1.1rem;
    margin-bottom: 0.5rem;
  }
  canvas {
    border: 2px solid #33ff33;
    box-shadow: 0 0 20px rgba(51, 255, 51, 0.15);
    image-rendering: pixelated;
  }
  #message {
    margin-top: 1rem;
    font-size: 1.1rem;
    height: 1.4rem;
    text-shadow: 0 0 8px #33ff33;
  }
</style>
</head>
<body>
<h1>SNAKE</h1>
<div id="hud">
  <span>SCORE: <span id="score">0</span></span>
  <span>HIGH: <span id="high">0</span></span>
  <span>SPEED: <span id="speed">1</span></span>
</div>
<canvas id="game" width="400" height="400"></canvas>
<div id="message">Press any arrow key to start</div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, high, gameOver, started, interval, speed;

high = +(localStorage.getItem('snakeHigh') || 0);
document.getElementById('high').textContent = high;

function init() {
  const midX = Math.floor(COLS / 2);
  const midY = Math.floor(ROWS / 2);
  snake = [{ x: midX, y: midY }, { x: midX - 1, y: midY }, { x: midX - 2, y: midY }];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = 1;
  gameOver = false;
  started = false;
  document.getElementById('score').textContent = 0;
  document.getElementById('speed').textContent = 1;
  document.getElementById('message').textContent = 'Press any arrow key to start';
  placeFood();
  draw();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function getInterval() {
  return Math.max(60, 150 - (speed - 1) * 10);
}

function tick() {
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true;
    clearInterval(interval);
    if (score > high) {
      high = score;
      localStorage.setItem('snakeHigh', high);
      document.getElementById('high').textContent = high;
    }
    document.getElementById('message').textContent = 'GAME OVER — Press R to restart';
    draw();
    return;
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score++;
    document.getElementById('score').textContent = score;
    if (score % 5 === 0) {
      speed++;
      document.getElementById('speed').textContent = speed;
      clearInterval(interval);
      interval = setInterval(tick, getInterval());
    }
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // grid lines
  ctx.strokeStyle = '#111';
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath(); ctx.moveTo(x * GRID, 0); ctx.lineTo(x * GRID, canvas.height); ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath(); ctx.moveTo(0, y * GRID); ctx.lineTo(canvas.width, y * GRID); ctx.stroke();
  }

  // snake
  snake.forEach((s, i) => {
    const brightness = Math.max(80, 255 - i * 8);
    ctx.fillStyle = i === 0 ? '#33ff33' : `rgb(0, ${brightness}, 0)`;
    ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
  });

  // food
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff3333';
  ctx.shadowBlur = 8;
  ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);
  ctx.shadowBlur = 0;

  if (gameOver) {
    ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#ff3333';
    ctx.font = 'bold 36px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', canvas.width / 2, canvas.height / 2);
  }
}

document.addEventListener('keydown', e => {
  const arrows = { ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
                    ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 } };

  if (arrows[e.key]) {
    e.preventDefault();
    const d = arrows[e.key];
    if (d.x !== -dir.x || d.y !== -dir.y) nextDir = d;
    if (!started && !gameOver) {
      started = true;
      nextDir = d;
      dir = d;
      document.getElementById('message').textContent = '';
      interval = setInterval(tick, getInterval());
    }
  }

  if (e.key === 'r' || e.key === 'R') {
    clearInterval(interval);
    init();
  }
});

init();
</script>
</body>
</html>
